input EmailTemplateInput {
  id: ID!
  name: String!
  subject: String!
  html: String!
  variables: [String!]
  category: String
  description: String
  isActive: Boolean
  headerId: String
  footerId: String
}

input EmailHeaderFooterInput {
  id: ID
  name: String!
  type: String!
  content: String!
  description: String
  isDefault: Boolean
  isActive: Boolean
}

input SendAdHocEmailInput {
  recipients: [String!]!
  cc: [String]
  bcc: [String]
  subject: String!
  bodyHtml: String!
  scheduledFor: String
  draftId: String
}

input SaveEmailDraftInput {
  id: String
  recipients: [String]
  cc: [String]
  bcc: [String]
  subject: String
  bodyHtml: String
}

type Mutation {
  upsertEmailTemplate(input: EmailTemplateInput!): EmailTemplate!
  deleteEmailTemplate(id: ID!): Boolean!
  upsertEmailHeaderFooter(input: EmailHeaderFooterInput!): EmailHeaderFooter!
  deleteEmailHeaderFooter(id: ID!): Boolean!
  deleteEmailAsset(name: String!): Boolean!
  sendAdHocEmail(input: SendAdHocEmailInput!): SentEmail!
  cancelScheduledEmail(id: ID!): Boolean!
  rescheduleEmail(id: ID!, scheduledFor: String!): SentEmail!
  saveEmailDraft(input: SaveEmailDraftInput!): SentEmail!
  deleteEmailDraft(id: ID!): Boolean!
}
