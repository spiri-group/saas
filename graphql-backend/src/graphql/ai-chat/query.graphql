type AiConversation {
    id: ID!
    title: String!
    createdDate: String!
    updatedDate: String!
    messageCount: Int!
    createdByUserId: String
    createdByEmail: String
}

type AiMessage {
    id: ID!
    conversationId: ID!
    role: String!
    content: String!
    createdDate: String!
    senderUserId: String
    senderEmail: String
}

type Query {
    aiConversations: [AiConversation]
    aiConversation(id: ID!): AiConversation
    aiMessages(conversationId: ID!): [AiMessage]
}
