type Query {
    socialpost(id: String, vendorId: String): SocialPost
    myFeed(limit: Int, offset: Int, activityTypes: [String]): MyFeedResponse
    exploreFeed(limit: Int, offset: Int, category: String): ExploreFeedResponse
}

type MyFeedResponse {
  activities: [FeedActivity]!
  hasMore: Boolean!
  followingCount: Int!
}

type ExploreFeedResponse {
  activities: [FeedActivity]!
  hasMore: Boolean!
}

type FeedActivity {
  id: String!
  vendorId: String!
  vendorName: String!
  vendorSlug: String!
  vendorLogo: Media
  vendorDocType: String!
  activityType: String!
  sourceId: String!
  title: String!
  subtitle: String
  media: Media
  coverPhoto: Media
  metadata: String
  publishedAt: DateTime!
}

type SocialPost {
  id: String!
  vendorId: String!
  type: String,
  title: String
  description: String,
  hashtags: [String]
  availableAfter: DateTime
  isPublished: Boolean
  content: SocialPostContent
  ref: RecordRef
}

union SocialPostContent = SocialPostTextOnlyContent | SocialPostMediaContent

type SocialPostMediaContent {
  media: [Media]
}

type SocialPostTextOnlyContent {
  mainText: TextSchema
  subText: TextSchema
  textVerticalAlignment: String
  backgroundType: String
  backgroundColor: String
  backgroundImage: Media
}
